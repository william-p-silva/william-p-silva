name: Update GitHub Stats

on:
  schedule:
    - cron: "0 3 * * *"   # Atualiza diariamente às 03h UTC
  workflow_dispatch:        # Permite rodar manualmente

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Gerar card de estatísticas
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=william-p-silva&show_icons=true&theme=tokyonight&hide_border=true&include_all_commits=true
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Gerar card de linguagens
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=william-p-silva&layout=compact&theme=tokyonight&hide_border=true&langs_count=8
          path: profile/langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit dos cards
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          mkdir -p profile
          git add profile/*.svg
          git commit -m "chore: atualizar cards de estatísticas" || exit 0
          git push